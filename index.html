<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>MIS 隨機測驗 20 題</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f4f7f6; }
        .quiz-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .question { margin-bottom: 25px; padding: 15px; border-radius: 8px; transition: background 0.3s; }
        .question-text { font-weight: bold; margin-bottom: 12px; font-size: 1.1em; }
        .options { display: grid; grid-template-columns: 1fr; gap: 8px; }
        button.option { background: #fff; border: 1px solid #ddd; padding: 10px 15px; text-align: left; border-radius: 6px; cursor: pointer; transition: all 0.2s; font-size: 1em; }
        button.option:hover { background: #e1f5fe; border-color: #3498db; }
        button.correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        button.wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        .feedback { margin-top: 10px; font-weight: bold; display: none; }
        #result-area { margin-top: 30px; text-align: center; display: none; padding: 20px; background: #e8f4fd; border-radius: 10px; }
        .progress { margin-bottom: 20px; font-size: 0.9em; color: #666; }
        .btn-restart { background: #3498db; color: white; border: none; padding: 10px 25px; border-radius: 5px; cursor: pointer; font-size: 1.1em; margin-top: 20px; }
        .btn-restart:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>MIS 管理資訊系統 - 隨機測驗</h2>
    <div class="progress" id="progress">進度：1 / 20</div>
    
    <div id="quiz-content">
        </div>

    <div id="result-area">
        <h3>測驗結束！</h3>
        <p id="score-text" style="font-size: 1.5em; font-weight: bold;"></p>
        <button class="btn-restart" onclick="location.reload()">重新挑戰</button>
    </div>
</div>

<script>
const allQuestions = [
    { q: "管理資訊系統的歷程包含哪些階段？", a: ["全部皆是", "電子數據處理階段", "決策支援系統階段", "管理資訊系統階段"], correct: 0 },
    { q: "價值鏈的增值流程不包含？", a: ["製造執行", "客戶關係管理", "供應鏈管理", "純粹資料收集"], correct: 3 },
    { q: "管理資訊系統是在企業管理層次的哪一層？", a: ["管理", "決策", "全部皆是", "策略"], correct: 2 },
    { q: "企業資訊化三階段過程包含？", a: ["管理分析", "電子數據", "交易處理", "全部皆是"], correct: 3 },
    { q: "Sherman Blumenthal 定義中，資訊需經過哪一程序？", a: ["分類、傳輸、評估", "收集、分析、報告", "解釋、儲存、分類", "記錄、分類、組織、關聯與解釋"], correct: 3 },
    { q: "利害關係人是指？", a: ["供應商", "客戶", "全部皆是", "銀行"], correct: 2 },
    { q: "下列何者是資訊的特性重點？", a: ["有用的", "原始的", "全部皆非", "未經整理"], correct: 0 },
    { q: "下列何者不是資料的特性重點？", a: ["未經整理", "有用的", "全部皆非", "原始的"], correct: 1 },
    { q: "下列何者非 MIS 與介面連接系統之關聯類型？", a: ["程式驅動", "資料匯入匯出", "決策支援", "呼叫連接"], correct: 2 },
    { q: "資訊是如何形成的？", a: ["由數據經整理、分類、計算後產生", "透過用戶介面輸入", "直接從經驗得來", "從資訊整理為數據"], correct: 0 },
    { q: "資料數據的特性不包含哪一項？", a: ["創新性", "完整性", "正確性", "結構性"], correct: 0 },
    { q: "MIS 定義中不包含何一項目標？", a: ["提升企業利潤", "降低成本", "增加資料重複率", "整合資料與資訊管理"], correct: 2 },
    { q: "Decision Support System (DSS) 主要提供何種功能？", a: ["即時交易處理", "分析模型支援決策", "知識管理", "企業資源規劃"], correct: 1 },
    { q: "資訊與資料的差異不包括？", a: ["資料是原始記錄", "資訊未經加工即具意義", "資訊需分類統計", "資訊具有時間性"], correct: 1 },
    { q: "何謂資料數據？", a: ["經過分類的數據", "提供決策的資訊", "模擬人類智慧的系統", "未經整理的交易記錄"], correct: 3 },
    { q: "「意義性」特性指的是？", a: ["資料自帶意義", "須符合決策或行動需求", "永遠不會過時", "可用於所有對象"], correct: 1 },
    { q: "下列何者最能代表資訊的「有用」特性？", a: ["結構化即是有用", "可自動產生報表", "資料量愈大愈有用", "後續決策需付成本取得"], correct: 3 },
    { q: "營運層面上，MIS 的效益不包括？", a: ["差異化競爭優勢", "作業程序自動化", "整合性報表快速產生", "完全取代人工決策"], correct: 3 },
    { q: "「串接系統」是指？", a: ["持續備份作業", "排程方式控制各系統互動", "用戶介面設計", "資料庫內部操作"], correct: 1 },
    { q: "從管理資訊系統和其他系統關聯的角度，企業整合導入不同系統時，須考量哪三大因素？", a: ["全部皆是", "軟體產品廠商的搭配", "MIS 部門在企業的功效", "資訊化問題的輔導"], correct: 0 },
    { q: "整合性報表在 MIS 上可分成哪些報表？", a: ["模擬分析", "作業程序", "決策分析", "全部皆是"], correct: 1 },
    { q: "企業營運流程主要是在控管什麼？", a: ["資訊", "資料", "全部皆非", "除全部皆非其餘皆是"], correct: 3 },
    { q: "管理資訊系統和作業系統關聯？它主要包含？", a: ["通訊", "全部皆是", "存取", "檢核"], correct: 0 },
    { q: "管理資訊系統和資料庫系統關聯？它主要包含？", a: ["全部皆是", "存取", "檢核", "轉換"], correct: 0 },
    { q: "管理資訊系統是在企業營運層次的定位？", a: ["管理和作業程序層次", "現場操作層次", "決策層次", "全部皆是"], correct: 0 },
    { q: "協同產品商務是指？", a: ["全部皆是", "ERP", "CPC", "CRM"], correct: 2 },
    { q: "利用資訊管理的發展運作，設計建構出可應用在企業不同作業功能的資訊系統，是指？", a: ["MIS 作業程序", "企業應用系統", "全部皆是", "MIS 組織"], correct: 1 },
    { q: "其他系統是指 MIS 本身環境相關的支援性系統，包含？", a: ["介面連接系統", "採購系統", "會計系統", "全部皆是"], correct: 3 },
    { q: "流程層面的效益？", a: ["改善再造", "步驟合理化", "流程自動化", "全部皆是"], correct: 3 },
    { q: "企業管理功能會受到哪些影響？", a: ["利害關係人", "企業環境", "除全部皆非其餘皆是", "全部皆非"], correct: 2 },
    { q: "以下何者不是管理資訊系統結構？", a: ["資訊管理的發展內容", "總經理室部門組織", "企業應用系統", "MIS 部門組織及作業程序"], correct: 1 },
    { q: "人機互動之所以困難重重，主要原因在於？", a: ["全部皆是", "以人為中心", "使用者很快就能熟悉", "面對電腦需開發自我感"], correct: 3 },
    { q: "MIS 軟體系統包含哪些模組？", a: ["資訊庫", "組織結構", "企業管理能力", "全部皆是"], correct: 3 },
    { q: "MIS 範疇中，下列何者屬於「建構」階段？", a: ["利害關係人創新", "軟體、硬體、網路通訊", "維護管理", "運用 MIS 軟體"], correct: 1 },
    { q: "「大量性」特性主要帶來何種負面影響？", a: ["儲存成本高且難尋重點", "資訊即時性", "資料正確性", "資料意義性"], correct: 0 },
    { q: "屬於「檔案型式資訊系統」的類型是？", a: ["交易處理系統", "決策支援系統", "人工智慧系統", "管理資訊系統"], correct: 0 },
    { q: "績效評估中「執行速度關聯」不可量？", a: ["硬體資源", "使用者教育訓練", "資料與程式關係", "程式架構複雜度"], correct: 1 },
    { q: "MIS 與資料庫系統在「檢核關聯」的主要作用？", a: ["加快存取速度", "自動化通訊", "確保資料正確性與完整性", "簡化格式轉換"], correct: 2 },
    { q: "在組織層面，MIS 對員工影響不包含？", a: ["提升整合能力", "增強跨部門溝通", "增進工作效率", "改變員工個人價值觀"], correct: 3 },
    { q: "交易型資料需跨部門管理機制，原因為何？", a: ["資料量太小", "無需審核", "流程跨製造、會計、業務等部門", "資料不會變動"], correct: 2 }
];

let selectedQuestions = [];
let currentQuestionIndex = 0;
let score = 0;

function initQuiz() {
    // 隨機選20題
    selectedQuestions = [...allQuestions].sort(() => 0.5 - Math.random()).slice(0, 20);
    renderQuestion();
}

function renderQuestion() {
    if (currentQuestionIndex >= selectedQuestions.length) {
        showResult();
        return;
    }

    const qData = selectedQuestions[currentQuestionIndex];
    document.getElementById('progress').innerText = `進度：${currentQuestionIndex + 1} / 20`;
    
    let html = `
        <div class="question">
            <div class="question-text">${qData.q}</div>
            <div class="options">
    `;
    
    qData.a.forEach((opt, index) => {
        html += `<button class="option" onclick="checkAnswer(${index}, this)">(${index + 1}) ${opt}</button>`;
    });
    
    html += `</div></div>`;
    document.getElementById('quiz-content').innerHTML = html;
}

function checkAnswer(selectedIndex, btnElement) {
    const qData = selectedQuestions[currentQuestionIndex];
    const buttons = document.querySelectorAll('.option');
    
    // 禁用所有按鈕防止重複點擊
    buttons.forEach(btn => btn.disabled = true);

    if (selectedIndex === qData.correct) {
        btnElement.classList.add('correct');
        score++;
    } else {
        btnElement.classList.add('wrong');
        buttons[qData.correct].classList.add('correct');
    }

    setTimeout(() => {
        currentQuestionIndex++;
        renderQuestion();
    }, 1200);
}

function showResult() {
    document.getElementById('quiz-content').style.display = 'none';
    document.getElementById('progress').style.display = 'none';
    const resultArea = document.getElementById('result-area');
    resultArea.style.display = 'block';
    
    const percentage = (score / 20) * 100;
    document.getElementById('score-text').innerText = `答對題數：${score} / 20 (${percentage}分)`;
}

initQuiz();
</script>

</body>
</html>
