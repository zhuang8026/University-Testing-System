<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIS 隨機測驗</title>
    <link rel="stylesheet" href="./asset/css/style.css">
</head>
<body>

<div class="quiz-container">
    <h2>MIS 管理資訊系統 - 隨機測驗：<select id="chapter-select">
        <option value="0">第一章</option>
        <option value="1">第二章</option>
        <option value="2">第三章</option>
        <option value="3">第四章</option>
        <option value="4">第五章</option>
        <option value="5">第六章</option>
        <option value="6">第七章</option>
        <option value="7">第八章</option>
    </select></h2>
    <div class="progress" id="progress">
        <span id="progress-text">進度：1 / 20</span>
        <span id="total-count"></span>
    </div>
    
    <div id="quiz-content"></div>

    <div id="result-area">
        <h3>測驗結束！</h3>
        <p id="score-text" style="font-size: 1.5em; font-weight: bold;"></p>
        <button class="btn-restart" onclick="location.reload()">重新挑戰</button>
    </div>
</div>

<script type="module">
import questionList from './asset/js/index.js';

const { qa01, qa02, qa03, qa04, qa05, qa06, qa07, qa08 } = questionList;
const allChapters = [qa01, qa02, qa03, qa04, qa05, qa06, qa07, qa08];

let selectedQuestions = [];
let currentQuestionIndex = 0;
let score = 0;

function initQuiz() {
    const chapterIndex = parseInt(document.getElementById('chapter-select').value);
    const pool = allChapters[chapterIndex];
    document.getElementById('total-count').innerText = `（題庫共 ${pool.length} 題）`;
    selectedQuestions = [...pool].sort(() => 0.5 - Math.random()).slice(0, 20);
    currentQuestionIndex = 0;
    score = 0;
    document.getElementById('quiz-content').style.display = '';
    document.getElementById('progress').style.display = '';
    document.getElementById('result-area').style.display = 'none';
    renderQuestion();
}

document.getElementById('chapter-select').addEventListener('change', initQuiz);

function renderQuestion() {
    if (currentQuestionIndex >= selectedQuestions.length) {
        showResult();
        return;
    }

    const qData = selectedQuestions[currentQuestionIndex];
    document.getElementById('progress-text').innerText = `進度：${currentQuestionIndex + 1} / 20`;
    
    let html = `
        <div class="question">
            <div class="question-text">${qData.q}</div>
            <div class="options">
    `;
    
    qData.a.forEach((opt, index) => {
        html += `<button class="option" onclick="checkAnswer(${index}, this)">(${index + 1}) ${opt}</button>`;
    });
    
    html += `</div></div>`;
    document.getElementById('quiz-content').innerHTML = html;
}

function checkAnswer(selectedIndex, btnElement) {
    const qData = selectedQuestions[currentQuestionIndex];
    const buttons = document.querySelectorAll('.option');
    
    // 禁用所有按鈕防止重複點擊
    buttons.forEach(btn => btn.disabled = true);

    if (selectedIndex === qData.correct) {
        btnElement.classList.add('correct');
        score++;
    } else {
        btnElement.classList.add('wrong');
        buttons[qData.correct].classList.add('correct');
    }

    setTimeout(() => {
        currentQuestionIndex++;
        renderQuestion();
    }, 1200);
}

function showResult() {
    document.getElementById('quiz-content').style.display = 'none';
    document.getElementById('progress').style.display = 'none';
    const resultArea = document.getElementById('result-area');
    resultArea.style.display = 'block';
    
    const percentage = (score / 20) * 100;
    document.getElementById('score-text').innerText = `答對題數：${score} / 20 (${percentage}分)`;
}

window.checkAnswer = checkAnswer;
initQuiz();
</script>

</body>
</html>
