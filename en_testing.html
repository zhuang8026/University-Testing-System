<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unit 5 英文模擬考</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;800;900&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #06080f;
        --surface: rgba(255, 255, 255, 0.035);
        --border: rgba(255, 255, 255, 0.07);
        --text: #d4dae6;
        --text2: rgba(255, 255, 255, 0.45);
        --text3: rgba(255, 255, 255, 0.25);
        --accent: #60a5fa;
        --accent2: #38bdf8;
        --green: #34d399;
        --red: #fb7185;
        --amber: #fbbf24;
        --font: 'Noto Sans TC', 'SF Pro Display', system-ui, sans-serif;
        --mono: 'JetBrains Mono', monospace;
      }
      html {
        font-size: 16px;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        min-height: 100vh;
        overflow-x: hidden;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: radial-gradient(
          ellipse 80% 50% at 50% -20%,
          rgba(56, 189, 248, 0.06),
          transparent 70%
        );
        pointer-events: none;
        z-index: 0;
      }
      .wrap {
        max-width: 620px;
        margin: 0 auto;
        padding: 20px 16px 40px;
        position: relative;
        z-index: 1;
      }

      /* ── Hero ── */
      .hero {
        text-align: center;
        padding: 72px 0 0;
        animation: fadeUp 0.6s ease;
      }
      .hero-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: linear-gradient(135deg, #1e3a5f, #0f2942);
        border: 1px solid rgba(96, 165, 250, 0.25);
        font-size: 32px;
        font-weight: 900;
        color: var(--accent);
        margin-bottom: 28px;
        box-shadow: 0 12px 40px rgba(56, 189, 248, 0.12);
      }
      .hero h1 {
        font-size: 30px;
        font-weight: 900;
        letter-spacing: -0.5px;
        color: #e8edf5;
        margin-bottom: 10px;
      }
      .hero p {
        font-size: 14px;
        color: var(--text2);
        line-height: 1.7;
        margin-bottom: 6px;
      }
      .hero .detail {
        font-size: 12px;
        color: var(--text3);
        margin-bottom: 36px;
      }
      .hero .coverage {
        text-align: left;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px 22px;
        margin-bottom: 32px;
        font-size: 13px;
        color: var(--text2);
        line-height: 2;
      }
      .hero .coverage b {
        color: var(--accent);
        font-weight: 700;
      }

      /* ── Buttons ── */
      .btn-primary {
        padding: 14px 44px;
        font-size: 15px;
        font-weight: 700;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #1d4ed8, #2563eb);
        color: #fff;
        cursor: pointer;
        box-shadow: 0 4px 24px rgba(37, 99, 235, 0.35);
        transition:
          transform 0.12s,
          box-shadow 0.12s;
        font-family: var(--font);
      }
      .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 28px rgba(37, 99, 235, 0.45);
      }
      .btn-secondary {
        padding: 13px 32px;
        font-size: 14px;
        font-weight: 600;
        border: 1px solid var(--border);
        border-radius: 11px;
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        transition: background 0.15s;
        font-family: var(--font);
      }
      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.07);
      }

      /* ── Progress ── */
      .progress-wrap {
        margin-bottom: 14px;
      }
      .progress-bar {
        height: 3px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 2px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--green));
        border-radius: 2px;
        transition: width 0.35s ease;
      }
      .progress-label {
        font-size: 11px;
        color: var(--text3);
        margin-top: 5px;
        text-align: right;
        font-family: var(--mono);
        font-weight: 500;
      }

      /* ── Dots ── */
      .dots {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        justify-content: center;
        margin-bottom: 18px;
      }
      .dot {
        width: 30px;
        height: 30px;
        border-radius: 7px;
        border: none;
        font-size: 11px;
        font-family: var(--mono);
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
        background: rgba(255, 255, 255, 0.05);
        color: var(--text3);
      }
      .dot.current {
        background: var(--accent);
        color: #fff;
        transform: scale(1.15);
        box-shadow: 0 2px 12px rgba(96, 165, 250, 0.3);
      }
      .dot.answered {
        background: rgba(52, 211, 153, 0.18);
        color: var(--green);
      }

      /* ── Question card ── */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 26px 22px;
        margin-bottom: 18px;
        animation: fadeUp 0.25s ease;
      }
      .card-head {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }
      .q-num {
        font-size: 13px;
        font-weight: 800;
        color: var(--accent);
        font-family: var(--mono);
      }
      .q-tag {
        font-size: 10px;
        padding: 3px 10px;
        border-radius: 20px;
        background: rgba(96, 165, 250, 0.12);
        color: var(--accent2);
        font-weight: 700;
        letter-spacing: 0.3px;
      }
      .q-text {
        font-size: 16px;
        font-weight: 600;
        line-height: 1.75;
        margin-bottom: 22px;
        white-space: pre-line;
      }
      .options {
        display: flex;
        flex-direction: column;
        gap: 9px;
      }
      .opt-btn {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 13px 16px;
        border-radius: 11px;
        border: 1.5px solid var(--border);
        background: transparent;
        cursor: pointer;
        font-size: 14px;
        font-family: var(--font);
        color: var(--text);
        text-align: left;
        transition: all 0.12s;
        line-height: 1.55;
      }
      .opt-btn:hover {
        border-color: rgba(96, 165, 250, 0.3);
        background: rgba(96, 165, 250, 0.05);
      }
      .opt-btn.selected {
        border-color: var(--accent);
        background: rgba(96, 165, 250, 0.1);
        color: #bfdbfe;
      }
      .opt-label {
        min-width: 26px;
        height: 26px;
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text3);
        flex-shrink: 0;
        font-family: var(--mono);
        transition: all 0.12s;
      }
      .opt-btn.selected .opt-label {
        background: var(--accent);
        color: #fff;
      }

      /* ── Nav ── */
      .nav {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }

      /* ── Result ── */
      .result {
        text-align: center;
        padding-top: 56px;
        animation: fadeUp 0.5s ease;
      }
      .result-emoji {
        font-size: 56px;
        margin-bottom: 14px;
      }
      .result-grade {
        font-size: 68px;
        font-weight: 900;
        line-height: 1;
        margin-bottom: 6px;
        background: linear-gradient(135deg, #93c5fd, #60a5fa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .result-score {
        font-size: 26px;
        font-weight: 800;
        margin-bottom: 4px;
      }
      .result-pct {
        font-size: 14px;
        color: var(--text2);
        margin-bottom: 22px;
      }
      .result-bar {
        height: 7px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 4px;
        overflow: hidden;
        max-width: 280px;
        margin: 0 auto 30px;
      }
      .result-bar-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 0.7s ease;
      }
      .result-btns {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      /* ── Review ── */
      .review-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 18px;
        padding-top: 10px;
      }
      .review-head h2 {
        font-size: 20px;
        font-weight: 800;
        color: #93c5fd;
      }
      .review-head span {
        font-size: 15px;
        font-weight: 700;
        color: var(--accent);
        font-family: var(--mono);
      }
      .review-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 28px;
      }
      .r-item {
        background: var(--surface);
        border-radius: 12px;
        padding: 16px 18px;
        border-left: 4px solid var(--green);
      }
      .r-item.wrong {
        border-left-color: var(--red);
      }
      .r-meta {
        display: flex;
        align-items: center;
        gap: 9px;
        margin-bottom: 9px;
        flex-wrap: wrap;
      }
      .r-num {
        font-size: 12px;
        font-weight: 800;
        color: var(--accent);
        font-family: var(--mono);
      }
      .r-tag {
        font-size: 10px;
        padding: 2px 9px;
        border-radius: 20px;
        font-weight: 700;
      }
      .r-tag.ok {
        background: rgba(52, 211, 153, 0.15);
        color: var(--green);
      }
      .r-tag.ng {
        background: rgba(251, 113, 133, 0.15);
        color: var(--red);
      }
      .r-type {
        font-size: 10px;
        color: var(--text3);
      }
      .r-q {
        font-size: 14px;
        line-height: 1.7;
        margin-bottom: 7px;
        white-space: pre-line;
      }
      .r-wrong {
        font-size: 12px;
        color: var(--red);
        margin-bottom: 3px;
      }
      .r-ans {
        font-size: 12px;
        color: var(--green);
        font-weight: 700;
        margin-bottom: 3px;
      }
      .r-expl {
        font-size: 12px;
        color: var(--text2);
        line-height: 1.6;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap" id="app"></div>

    <script>
      // ═══════════════════════════════════════════════════════════════
      //  COMPLETE QUESTION BANK — every item from the notes
      // ═══════════════════════════════════════════════════════════════

      const CORE = [
        {
          w: 'purpose',
          zh: '目的',
          syns: ['intention', 'aim', 'motive', 'motivation', 'goal'],
          phrase: {
            k: 'on purpose',
            means: 'intentionally / deliberately / purposely（故意地）',
            wrongMeans: ['偶然地；意外地', '不知不覺地', '勉強地；不情願地'],
          },
          sent: {
            text: 'Everywhere on earth there are food specialists with opposite opinions on the best kinds of nutrition for various ___.',
            ans: 'purposes',
          },
        },
        {
          w: 'achieve',
          zh: '達到',
          syns: ['fulfill', 'accomplish', 'attain', 'reach'],
          forms: [
            {
              f: 'achievement',
              pos: 'n.',
              syns: ['fulfillment', 'accomplishment', 'attainment'],
            },
            { f: 'achievable', pos: 'adj.', syns: [] },
          ],
          sent: {
            text: 'On the last day, all of us stood inside a room we had built in just a week, feeling a sense of ___.',
            ans: 'achievement',
          },
        },
        {
          w: 'celebrate',
          zh: '慶祝',
          syns: ['commemorate', 'observe'],
          forms: [
            {
              f: 'celebrated',
              pos: 'adj.',
              syns: [
                'distinguished',
                'outstanding',
                'prominent',
                'eminent',
                'remarkable',
                'important',
                'well-known',
              ],
            },
          ],
        },
        {
          w: 'impact',
          zh: '影響',
          syns: ['influence', 'affect'],
          phrase: {
            k: 'have a powerful impact on',
            means: '對…有強大的影響',
            wrongMeans: ['與…毫無關係', '為…感到抱歉', '對…感到困惑'],
          },
          sent: {
            text: "Education can have a huge ___ on a child's life.",
            ans: 'impact',
          },
        },
        {
          w: 'cunning',
          zh: '狡猾',
          syns: ['wily', 'sly', 'crafty', 'shrewd', 'tricky'],
        },
        {
          w: 'tradition',
          zh: '傳統',
          syns: ['convention', 'custom'],
          def: 'a custom or belief handed down from generation to generation',
          forms: [{ f: 'traditional', pos: 'adj.', syns: ['conventional'] }],
          sent: {
            text: "It's ___ in some countries for the bride to wear a white dress for the wedding.",
            ans: 'traditional',
          },
        },
        {
          w: 'excited',
          zh: '興奮',
          syns: ['incited', 'provoked', 'stirred', 'thrilled'],
          forms: [
            {
              f: 'excite',
              pos: 'v.',
              syns: ['incite', 'provoke', 'stir', 'thrill'],
            },
            {
              f: 'exciting',
              pos: 'adj.',
              syns: ['inciting', 'provoking', 'stirring', 'thrilling'],
            },
          ],
        },
        {
          w: 'evident',
          zh: '明顯',
          syns: ['obvious', 'apparent', 'clear', 'plain'],
          forms: [{ f: 'evidently', pos: 'adv.', syns: ['obviously'] }],
          sent: {
            text: 'For ___ reasons, the government worries that the volcano will erupt again.',
            ans: 'evident',
          },
        },
        {
          w: 'replace',
          zh: '代替',
          syns: ['substitute', 'take the place of', 'displace', 'supplant'],
          forms: [
            {
              f: 'replacement',
              pos: 'n.',
              syns: ['substitution', 'supplanting', 'taking the place of'],
            },
          ],
          sent: {
            text: 'Television and video can easily ___ family communication as well as physical activity and other interests.',
            ans: 'replace',
          },
        },
        {
          w: 'ancient',
          zh: '古老的',
          syns: ['old', 'aged', 'antique', 'archaic'],
          def: 'belonging to the very distant past（古代的；古老的）',
        },
        {
          w: 'participate',
          zh: '參加',
          syns: [
            'take part in',
            'partake in',
            'join in',
            'engage in',
            'become involved in',
          ],
          forms: [
            { f: 'participation', pos: 'n.', syns: [] },
            { f: 'participant', pos: 'n.', syns: [] },
          ],
        },
        {
          w: 'competitor',
          zh: '競爭者',
          syns: [
            'rival',
            'opponent',
            'contender',
            'contestant',
            'challenger',
            'antagonist',
          ],
          forms: [
            {
              f: 'competition',
              pos: 'n.',
              syns: ['match', 'contest', 'rivalry'],
            },
            {
              f: 'compete',
              pos: 'v.',
              syns: ['rival', 'contend', 'contest', 'match'],
            },
            { f: 'competitive', pos: 'adj.', syns: [] },
          ],
        },
        {
          w: 'represent',
          zh: '代表',
          syns: [
            'stand for',
            'symbolize',
            'denote',
            'exemplify',
            'describe',
            'portray',
            'explain',
            'define',
          ],
          forms: [
            {
              f: 'representation',
              pos: 'n.',
              syns: ['depiction', 'portrayal', 'symbol'],
            },
          ],
          sent: {
            text: 'The color green ___ peace and happiness.',
            ans: 'represents',
          },
        },
        {
          w: 'proud',
          zh: '自豪的',
          syns: [
            'arrogant',
            'insolent',
            'scornful',
            'disdainful',
            'contemptuous',
          ],
          forms: [
            {
              f: 'pride',
              pos: 'n.',
              syns: [
                'hubris',
                'arrogance',
                'insolence',
                'scorn',
                'disdain',
                'contempt',
              ],
            },
          ],
        },
      ];

      const SPORTS = [
        {
          w: 'sailing',
          zh: '帆船運動；航行',
          def: 'the action of sailing in a ship or boat as a sport or pastime',
        },
        {
          w: 'boxing',
          zh: '拳擊；拳擊運動',
          def: 'the sport or practice of fighting with the fists, especially with padded gloves in a ring',
        },
        {
          w: 'table tennis',
          zh: '桌球；乒乓球',
          def: 'a game in which two or four players hit a lightweight ball back and forth across a table using small rackets',
        },
        {
          w: 'judo',
          zh: '柔道',
          def: 'a sport of Japanese origin in which the goal is to throw or tackle an opponent to the ground',
        },
        {
          w: 'fencing',
          zh: '擊劍；劍術',
          def: 'the sport of fighting with light swords to score points',
        },
        {
          w: 'gymnastics',
          zh: '體操',
          def: 'exercises developing or displaying physical agility and coordination, typically performed on equipment',
        },
      ];

      const CHILD = [
        { w: 'view ... as', zh: '視...為' },
        { w: 'eccentricities', zh: '怪癖；古怪行為' },
        { w: 'kidding around', zh: '開玩笑；玩鬧' },
        { w: 'elementary', zh: '基本的；單純的' },
        { w: 'fate', zh: '命運' },
        { w: 'compensate', zh: '補償' },
        { w: 'wonder', zh: '奇蹟；奇遇' },
        { w: 'adventurous', zh: '冒險的' },
        { w: 'conquest', zh: '征服' },
        { w: 'fantastical', zh: '奇幻的' },
        { w: 'painful', zh: '痛苦的' },
      ];

      // ═══════════════════════════════════════════════════════════════
      //  HELPERS
      // ═══════════════════════════════════════════════════════════════
      function shuffle(a) {
        const b = [...a];
        for (let i = b.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [b[i], b[j]] = [b[j], b[i]];
        }
        return b;
      }
      function pick(a, n) {
        const s = shuffle(a);
        return n == null ? s[0] : s.slice(0, n);
      }
      function pickOthers(correct, pool, n = 3) {
        return shuffle(pool.filter((x) => x !== correct)).slice(0, n);
      }

      // Collect ALL synonyms flat
      const allCoreSyns = CORE.flatMap((c) => c.syns || []);
      const allFormSyns = CORE.flatMap((c) =>
        (c.forms || []).flatMap((f) => f.syns || []),
      ).filter(Boolean);
      const allForms = CORE.flatMap((c) => (c.forms || []).map((f) => f.f));
      const allCoreWords = CORE.map((c) => c.w);
      const allZhCore = CORE.map((c) => c.zh);
      const allZhChild = CHILD.map((c) => c.zh);
      const allZhSports = SPORTS.map((c) => c.zh);

      const posLabel = (p) =>
        p === 'n.'
          ? '名詞'
          : p === 'adj.'
            ? '形容詞'
            : p === 'adv.'
              ? '副詞'
              : '動詞';
      const TYPE_LABELS = {
        syn: '同義詞',
        rsyn: '反向同義詞',
        zh2en: '中翻英',
        en2zh: '英翻中',
        fill: '填空',
        wform: '詞性變化',
        phrase: '片語',
        sdef: '運動定義',
        szh: '運動翻譯',
        child: '歌詞單字',
        celsyn: 'celebrated同義詞',
        pridesyn: 'pride同義詞',
        defn: '定義配對',
        fsyn: '詞形同義詞',
        notsyn: '反向選擇',
        sen2zh: '運動英翻中',
        sformq: '衍生詞配對',
      };

      // ═══════════════════════════════════════════════════════════════
      //  QUESTION GENERATORS — covers every piece of content
      // ═══════════════════════════════════════════════════════════════

      // Each generator returns {type, question, options:[], answer, explanation}

      const G = {};

      // 1. Core word synonym
      G.syn = () => {
        const c = pick(CORE.filter((x) => x.syns.length > 0));
        const ans = pick(c.syns);
        const dist = pickOthers(ans, [...allCoreSyns, ...allFormSyns], 3);
        return {
          type: 'syn',
          question: `下列哪個是 "${c.w}"（${c.zh}）的同義詞？`,
          options: shuffle([ans, ...dist]),
          answer: ans,
          explanation: `${c.w} 的同義詞：${c.syns.join(', ')}`,
        };
      };

      // 2. Reverse synonym
      G.rsyn = () => {
        const c = pick(CORE.filter((x) => x.syns.length > 0));
        const syn = pick(c.syns);
        const others = pick(
          CORE.filter((x) => x.w !== c.w),
          3,
        ).map((x) => x.w);
        return {
          type: 'rsyn',
          question: `"${syn}" 是下列哪個單字的同義詞？`,
          options: shuffle([c.w, ...others]),
          answer: c.w,
          explanation: `${syn} 是 ${c.w}（${c.zh}）的同義詞`,
        };
      };

      // 3. Chinese → English (core + childhood)
      G.zh2en = () => {
        const pool = [...CORE, ...CHILD];
        const c = pick(pool);
        const others = pick(
          pool.filter((x) => x.w !== c.w),
          3,
        ).map((x) => x.w);
        return {
          type: 'zh2en',
          question: `「${c.zh}」的英文是？`,
          options: shuffle([c.w, ...others]),
          answer: c.w,
          explanation: `${c.zh} → ${c.w}`,
        };
      };

      // 4. English → Chinese (core + childhood)
      G.en2zh = () => {
        const pool = [...CORE, ...CHILD];
        const c = pick(pool);
        const others = pick(
          pool.filter((x) => x.zh !== c.zh),
          3,
        ).map((x) => x.zh);
        return {
          type: 'en2zh',
          question: `"${c.w}" 的中文意思是？`,
          options: shuffle([c.zh, ...others]),
          answer: c.zh,
          explanation: `${c.w} → ${c.zh}`,
        };
      };

      // 5. Fill in the blank (example sentences)
      G.fill = () => {
        const pool = CORE.filter((x) => x.sent);
        const c = pick(pool);
        const others = pick(
          pool.filter((x) => x.sent.ans !== c.sent.ans),
          3,
        ).map((x) => x.sent.ans);
        return {
          type: 'fill',
          question: `填入最適當的單字：\n"${c.sent.text}"`,
          options: shuffle([c.sent.ans, ...others]),
          answer: c.sent.ans,
          explanation: `正確答案：${c.sent.ans}（源自 ${c.w}，${c.zh}）`,
        };
      };

      // 6. Word form
      G.wform = () => {
        const pool = CORE.filter((x) => x.forms && x.forms.length > 0);
        const c = pick(pool);
        const f = pick(c.forms);
        const dist = pickOthers(f.f, allForms, 3);
        return {
          type: 'wform',
          question: `"${c.w}"（${c.zh}）的${posLabel(f.pos)}形式是？`,
          options: shuffle([f.f, ...dist]),
          answer: f.f,
          explanation: `${c.w} → ${f.f}（${f.pos}）`,
        };
      };

      // 7. Phrase meaning
      G.phrase = () => {
        const pool = CORE.filter((x) => x.phrase);
        const c = pick(pool);
        return {
          type: 'phrase',
          question: `片語 "${c.phrase.k}" 的意思是？`,
          options: shuffle([c.phrase.means, ...c.phrase.wrongMeans]),
          answer: c.phrase.means,
          explanation: `${c.phrase.k} = ${c.phrase.means}`,
        };
      };

      // 8. Sport definition → word
      G.sdef = () => {
        const s = pick(SPORTS);
        const others = pick(
          SPORTS.filter((x) => x.w !== s.w),
          3,
        ).map((x) => x.w);
        return {
          type: 'sdef',
          question: `哪個運動的定義是：\n"${s.def}"？`,
          options: shuffle([s.w, ...others]),
          answer: s.w,
          explanation: `${s.w}（${s.zh}）`,
        };
      };

      // 9. Sport zh → en
      G.szh = () => {
        const s = pick(SPORTS);
        const others = pick(
          SPORTS.filter((x) => x.w !== s.w),
          3,
        ).map((x) => x.w);
        return {
          type: 'szh',
          question: `「${s.zh}」的英文是？`,
          options: shuffle([s.w, ...others]),
          answer: s.w,
          explanation: `${s.zh} → ${s.w}`,
        };
      };

      // 10. Sport en → zh
      G.sen2zh = () => {
        const s = pick(SPORTS);
        const others = pick(
          SPORTS.filter((x) => x.zh !== s.zh),
          3,
        ).map((x) => x.zh);
        return {
          type: 'sen2zh',
          question: `"${s.w}" 的中文意思是？`,
          options: shuffle([s.zh, ...others]),
          answer: s.zh,
          explanation: `${s.w} → ${s.zh}`,
        };
      };

      // 11. Childhood vocab
      G.child = () => {
        const c = pick(CHILD);
        const others = pick(
          CHILD.filter((x) => x.w !== c.w),
          3,
        ).map((x) => x.zh);
        return {
          type: 'child',
          question: `歌曲 Childhood 中，"${c.w}" 的意思是？`,
          options: shuffle([c.zh, ...others]),
          answer: c.zh,
          explanation: `${c.w} → ${c.zh}`,
        };
      };

      // 12. Childhood reverse (zh → en)
      G.child_rev = () => {
        const c = pick(CHILD);
        const others = pick(
          CHILD.filter((x) => x.w !== c.w),
          3,
        ).map((x) => x.w);
        return {
          type: 'child',
          question: `Childhood 歌詞中，「${c.zh}」的英文是？`,
          options: shuffle([c.w, ...others]),
          answer: c.w,
          explanation: `${c.zh} → ${c.w}`,
        };
      };

      // 13. celebrated synonyms
      G.celsyn = () => {
        const syns = [
          'distinguished',
          'outstanding',
          'prominent',
          'eminent',
          'remarkable',
          'important',
          'well-known',
        ];
        const ans = pick(syns);
        const wrongPool = [
          'cunning',
          'ancient',
          'evident',
          'competitive',
          'painful',
          'elementary',
          'crafty',
          'archaic',
        ];
        const dist = pick(wrongPool, 3);
        return {
          type: 'celsyn',
          question: `"celebrated"（著名的）的同義詞是？`,
          options: shuffle([ans, ...dist]),
          answer: ans,
          explanation: `celebrated 的同義詞：${syns.join(', ')}`,
        };
      };

      // 14. pride synonyms
      G.pridesyn = () => {
        const syns = [
          'hubris',
          'arrogance',
          'insolence',
          'scorn',
          'disdain',
          'contempt',
        ];
        const ans = pick(syns);
        const wrongPool = [
          'fulfillment',
          'accomplishment',
          'participation',
          'representation',
          'convention',
          'substitution',
        ];
        const dist = pick(wrongPool, 3);
        return {
          type: 'pridesyn',
          question: `"pride"（傲慢）的同義詞是？`,
          options: shuffle([ans, ...dist]),
          answer: ans,
          explanation: `pride 的同義詞：${syns.join(', ')}`,
        };
      };

      // 15. Definition match (tradition, ancient, + sports)
      G.defn = () => {
        const pool = [
          {
            w: 'tradition',
            def: 'a custom or belief handed down from generation to generation',
          },
          { w: 'ancient', def: 'belonging to the very distant past' },
          ...SPORTS,
        ];
        const c = pick(pool);
        const others = pick(
          pool.filter((x) => x.w !== c.w),
          3,
        ).map((x) => x.w);
        return {
          type: 'defn',
          question: `下列哪個字的定義是：\n"${c.def}"？`,
          options: shuffle([c.w, ...others]),
          answer: c.w,
          explanation: `${c.w}：${c.def}`,
        };
      };

      // 16. Form synonym
      G.fsyn = () => {
        const pool = CORE.filter((c) =>
          c.forms?.some((f) => f.syns?.length > 0),
        );
        const c = pick(pool);
        const f = pick(c.forms.filter((f) => f.syns?.length > 0));
        const ans = pick(f.syns);
        const allFS = pool
          .flatMap((c2) => c2.forms.flatMap((ff) => ff.syns || []))
          .filter(Boolean);
        const dist = pickOthers(ans, allFS, 3);
        return {
          type: 'fsyn',
          question: `"${f.f}" 的同義詞是？`,
          options: shuffle([ans, ...dist]),
          answer: ans,
          explanation: `${f.f}（${c.w} 的${posLabel(f.pos)}形式）同義詞：${f.syns.join(', ')}`,
        };
      };

      // 17. NOT a synonym
      G.notsyn = () => {
        const c = pick(CORE.filter((x) => x.syns.length >= 3));
        const realSyns = pick(c.syns, 3);
        const otherSyns = CORE.filter((x) => x.w !== c.w)
          .flatMap((x) => x.syns)
          .filter((s) => !c.syns.includes(s));
        const wrong = pick(otherSyns);
        return {
          type: 'notsyn',
          question: `下列哪個「不是」"${c.w}"（${c.zh}）的同義詞？`,
          options: shuffle([...realSyns, wrong]),
          answer: wrong,
          explanation: `${c.w} 的同義詞是：${c.syns.join(', ')}。${wrong} 不是其中之一。`,
        };
      };

      // 18. Word form reverse — given form, identify the root word
      G.sformq = () => {
        const pool = CORE.filter((x) => x.forms && x.forms.length > 0);
        const c = pick(pool);
        const f = pick(c.forms);
        const others = pick(
          pool.filter((x) => x.w !== c.w),
          3,
        ).map((x) => x.w);
        return {
          type: 'sformq',
          question: `"${f.f}"（${posLabel(f.pos)}）是哪個單字的衍生詞？`,
          options: shuffle([c.w, ...others]),
          answer: c.w,
          explanation: `${f.f} 是 ${c.w}（${c.zh}）的${posLabel(f.pos)}形式`,
        };
      };

      // Weighted generator pool — weights ensure all content areas are covered
      const POOL = [
        ...Array(3).fill('syn'),
        ...Array(2).fill('rsyn'),
        ...Array(2).fill('zh2en'),
        ...Array(2).fill('en2zh'),
        ...Array(2).fill('fill'),
        ...Array(2).fill('wform'),
        ...Array(1).fill('phrase'),
        ...Array(2).fill('sdef'),
        ...Array(1).fill('szh'),
        ...Array(1).fill('sen2zh'),
        ...Array(2).fill('child'),
        ...Array(1).fill('child_rev'),
        ...Array(1).fill('celsyn'),
        ...Array(1).fill('pridesyn'),
        ...Array(1).fill('defn'),
        ...Array(2).fill('fsyn'),
        ...Array(1).fill('notsyn'),
        ...Array(1).fill('sformq'),
      ];

      // ═══════════════════════════════════════════════════════════════
      //  QUIZ GENERATION — ensures coverage + uniqueness
      // ═══════════════════════════════════════════════════════════════
      function generateQuiz() {
        const qs = [];
        const keys = new Set();

        // Mandatory coverage — at least one from each content area
        const mandatory = [
          'syn',
          'rsyn',
          'fill',
          'wform',
          'phrase',
          'sdef',
          'szh',
          'child',
          'child_rev',
          'celsyn',
          'pridesyn',
          'defn',
          'fsyn',
          'notsyn',
          'sen2zh',
          'sformq',
          'zh2en',
          'en2zh',
        ];
        for (const t of mandatory) {
          let tries = 0;
          while (tries < 30) {
            tries++;
            const q = G[t]();
            if (!keys.has(q.question)) {
              keys.add(q.question);
              qs.push(q);
              break;
            }
          }
        }

        // Fill to 25 from weighted pool
        let safety = 0;
        while (qs.length < 25 && safety < 300) {
          safety++;
          const t = pick(POOL);
          const q = G[t]();
          if (!keys.has(q.question)) {
            keys.add(q.question);
            qs.push(q);
          }
        }
        return shuffle(qs).slice(0, 25);
      }

      // ═══════════════════════════════════════════════════════════════
      //  RENDERING (Pure DOM)
      // ═══════════════════════════════════════════════════════════════
      const $ = (id) => document.getElementById(id);
      const app = $('app');

      let quiz = null,
        cur = 0,
        sel = {},
        submitted = false,
        reviewing = false;

      function render() {
        if (!quiz) return renderHero();
        if (submitted && !reviewing) return renderResult();
        if (submitted && reviewing) return renderReview();
        renderQuiz();
      }

      function renderHero() {
        app.innerHTML = `
    <div class="hero">
      <div class="hero-badge">英</div>
      <h1>Unit 5 模擬考</h1>
      <p>全面覆蓋所有筆記內容，每次隨機 25 題</p>
      <div class="coverage">
        <b>14 個核心單字</b>：同義詞、詞性變化、衍生詞同義詞、例句填空<br>
        <b>片語</b>：on purpose、have a powerful impact on<br>
        <b>定義配對</b>：tradition、ancient 及 6 個運動單字<br>
        <b>6 個運動單字</b>：sailing, boxing, table tennis, judo, fencing, gymnastics<br>
        <b>11 個 Childhood 歌詞單字</b>：中英互譯<br>
        <b>特殊同義詞群</b>：celebrated（7 個同義詞）、pride（6 個同義詞）
      </div>
      <button class="btn-primary" onclick="startQuiz()">開始測驗</button>
    </div>`;
      }

      function renderQuiz() {
        const q = quiz[cur];
        const answered = Object.keys(sel).length;
        const letters = 'ABCD';

        let dotsHtml = quiz
          .map((_, i) => {
            let cls = 'dot';
            if (i === cur) cls += ' current';
            else if (sel[i] != null) cls += ' answered';
            return `<button class="${cls}" onclick="goTo(${i})">${i + 1}</button>`;
          })
          .join('');

        let optsHtml = q.options
          .map((o, oi) => {
            const isSel = sel[cur] === o;
            return `<button class="opt-btn${isSel ? ' selected' : ''}" onclick="selectOpt(${cur},'${o.replace(/'/g, "\\'")}')">
      <span class="opt-label">${letters[oi]}</span>${o}
    </button>`;
          })
          .join('');

        const prevDisabled = cur === 0 ? "disabled style='opacity:.3'" : '';
        const nextBtn =
          cur < 24
            ? `<button class="btn-secondary" onclick="goTo(${cur + 1})">下一題 →</button>`
            : answered < 25
              ? `<button class="btn-primary" style="opacity:.45;cursor:not-allowed" disabled>還有 ${25 - answered} 題未答</button>`
              : `<button class="btn-primary" onclick="submitQuiz()">提交答案</button>`;

        app.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${(answered / 25) * 100}%"></div></div>
      <div class="progress-label">${answered}/25 已作答</div>
    </div>
    <div class="dots">${dotsHtml}</div>
    <div class="card">
      <div class="card-head">
        <span class="q-num">Q${cur + 1}</span>
        <span class="q-tag">${TYPE_LABELS[q.type] || q.type}</span>
      </div>
      <p class="q-text">${q.question}</p>
      <div class="options">${optsHtml}</div>
    </div>
    <div class="nav">
      <button class="btn-secondary" onclick="goTo(${cur - 1})" ${prevDisabled}>← 上一題</button>
      ${nextBtn}
    </div>`;
      }

      function renderResult() {
        const score = quiz.filter((_, i) => sel[i] === quiz[i].answer).length;
        const pct = Math.round((score / 25) * 100);
        const grade =
          pct >= 90
            ? 'A'
            : pct >= 80
              ? 'B'
              : pct >= 70
                ? 'C'
                : pct >= 60
                  ? 'D'
                  : 'F';
        const emoji =
          pct >= 90 ? '🎉' : pct >= 70 ? '👍' : pct >= 50 ? '📖' : '💪';
        const barColor =
          pct >= 70
            ? 'var(--green)'
            : pct >= 50
              ? 'var(--amber)'
              : 'var(--red)';
        app.innerHTML = `
    <div class="result">
      <div class="result-emoji">${emoji}</div>
      <div class="result-grade">${grade}</div>
      <div class="result-score">${score} / 25</div>
      <div class="result-pct">${pct}%</div>
      <div class="result-bar"><div class="result-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
      <div class="result-btns">
        <button class="btn-secondary" onclick="showReview()">查看詳解</button>
        <button class="btn-primary" onclick="startQuiz()">再考一次</button>
      </div>
    </div>`;
      }

      function renderReview() {
        const score = quiz.filter((_, i) => sel[i] === quiz[i].answer).length;
        let items = quiz
          .map((q, i) => {
            const ok = sel[i] === q.answer;
            return `<div class="r-item${ok ? '' : ' wrong'}">
      <div class="r-meta">
        <span class="r-num">Q${i + 1}</span>
        <span class="r-tag ${ok ? 'ok' : 'ng'}">${ok ? '✓ 正確' : '✗ 錯誤'}</span>
        <span class="r-type">${TYPE_LABELS[q.type] || q.type}</span>
      </div>
      <p class="r-q">${q.question}</p>
      ${!ok && sel[i] ? `<p class="r-wrong">你的答案：${sel[i]}</p>` : ''}
      <p class="r-ans">正確答案：${q.answer}</p>
      <p class="r-expl">${q.explanation}</p>
    </div>`;
          })
          .join('');

        app.innerHTML = `
    <div class="review-head">
      <h2>答題詳解</h2>
      <span>${score} / 25</span>
    </div>
    <div class="review-list">${items}</div>
    <div style="text-align:center;padding:4px 0 20px">
      <button class="btn-primary" onclick="startQuiz()">再考一次</button>
    </div>`;
      }

      // ═══════════════════════════════════════════════════════════════
      //  ACTIONS
      // ═══════════════════════════════════════════════════════════════
      window.startQuiz = () => {
        quiz = generateQuiz();
        cur = 0;
        sel = {};
        submitted = false;
        reviewing = false;
        render();
        window.scrollTo(0, 0);
      };
      window.goTo = (i) => {
        if (i >= 0 && i < 25) {
          cur = i;
          render();
          window.scrollTo(0, 0);
        }
      };
      window.selectOpt = (qi, val) => {
        sel[qi] = val;
        render();
      };
      window.submitQuiz = () => {
        submitted = true;
        reviewing = false;
        render();
        window.scrollTo(0, 0);
      };
      window.showReview = () => {
        reviewing = true;
        render();
        window.scrollTo(0, 0);
      };

      render();
    </script>
  </body>
</html>
